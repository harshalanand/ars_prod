# ============================================================================
# Alembic config — ARS System DB (Claude)
# ============================================================================
# The actual SQLAlchemy URL is built at runtime in alembic/env.py from
# app.core.config.Settings (which already knows how to read .env and
# app_settings.json). Do NOT hardcode credentials here.
#
# Run from backend/:
#   alembic revision --autogenerate -m "describe change"
#   alembic upgrade head
#   alembic downgrade -1
#   alembic current
#   alembic history
# ============================================================================

[alembic]
script_location = alembic

# Migration filenames: 0001_add_users.py, 0002_widen_email.py, ...
file_template = %%(rev)s_%%(slug)s

# Treat migrations as UTC-naive timestamps in filenames (off — we use rev hashes)
timezone =

# Use OS path separator that works on Windows + Linux
prepend_sys_path = .

# Output format for `alembic history`
truncate_slug_length = 40

# Don't emit empty migrations on autogenerate
revision_environment = false

# We populate sqlalchemy.url at runtime in env.py — leave blank here
sqlalchemy.url =


# ============================================================================
# Logging
# ============================================================================
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
